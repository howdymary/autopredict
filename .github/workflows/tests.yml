name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest tests -q

  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel
        run: python -m pip install --upgrade pip build && python -m build

      - name: Install wheel
        run: python -m pip install dist/*.whl

      - name: Smoke test installed package
        run: |
          cd /tmp
          python -c "import autopredict; import autopredict.config; print(autopredict.__version__)"
          python -m autopredict.cli backtest
